services:
  portfolio:
    image: ghcr.io/ismoillmirabbosoff/portfolio:latest
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.10"
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
